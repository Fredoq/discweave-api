name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build solution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DiscWeave.slnx

      - name: Build
        run: dotnet build DiscWeave.slnx --configuration Release --no-restore
