name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path "$env:RUNNER_TEMP\scanner" -ItemType Directory -Force
          dotnet tool update dotnet-sonarscanner --tool-path "$env:RUNNER_TEMP\scanner"

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          # Coverage exclusions are limited to generated persistence, bootstrapping, Identity POCO/claims glue, and Minimal API boundary glue. Endpoint behavior is covered by integration tests; DTOs, route registration, and HTTP result helpers do not carry independent branch behavior worth gating on line coverage.
          $coverageExclusions = @(
            "**/Cratebase.Api/Program.cs",
            "**/Cratebase.Api/Auth/CratebaseAuthorizationPolicies.cs",
            "**/Cratebase.Api/Features/**/*Extensions.cs",
            "**/Cratebase.Api/Features/**/*Request.cs",
            "**/Cratebase.Api/Features/**/*Response.cs",
            "**/Cratebase.Api/Features/**/*Mapper.cs",
            "**/Cratebase.Api/Features/CatalogingMapper.cs",
            "**/Cratebase.Api/Http/**",
            "**/Persistence/**",
            "**/Application/Persistence/**",
            "**/Cratebase.Infrastructure/DependencyInjection.cs",
            "**/Cratebase.Infrastructure/Identity/CratebaseRoles.cs",
            "**/Cratebase.Infrastructure/Identity/CratebaseUser.cs",
            "**/Cratebase.Infrastructure/Identity/CratebaseUserClaimsPrincipalFactory.cs",
            "**/Cratebase.Domain/Collection/OwnedItem.cs",
            "**/Cratebase.Domain/Catalog/ReleaseSummary.cs",
            "**/Cratebase.Domain/Catalog/ReleaseTrack.cs",
            "**/Cratebase.Domain/Catalog/Track.cs",
            "**/Cratebase.Domain/Catalog/TrackPosition.cs"
          ) -join ","
          $duplicationExclusions = @(
            "**/Persistence/Migrations/**"
          ) -join ","
          & "$env:RUNNER_TEMP\scanner\dotnet-sonarscanner" begin /k:"Fredoq_cratebase-api" /o:"fredoq" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.cs.opencover.reportsPaths="artifacts/test-results/**/coverage.opencover.xml" /d:sonar.coverage.exclusions="$coverageExclusions" /d:sonar.cpd.exclusions="$duplicationExclusions"
          dotnet restore Cratebase.slnx
          dotnet build Cratebase.slnx --configuration Release --no-restore
          dotnet test Cratebase.slnx --configuration Release --no-build --logger trx --results-directory artifacts/test-results --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          & "$env:RUNNER_TEMP\scanner\dotnet-sonarscanner" end /d:sonar.token="$env:SONAR_TOKEN"
