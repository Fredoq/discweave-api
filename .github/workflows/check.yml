name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  format:
    name: Format and style
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DiscWeave.slnx

      - name: Verify formatting and style
        run: dotnet format DiscWeave.slnx --verify-no-changes --verbosity diagnostic
