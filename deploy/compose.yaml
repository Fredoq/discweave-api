services:
  proxy:
    image: nginx:stable-alpine
    depends_on:
      - api
      - web
    ports:
      - "${CRATEBASE_HOST_PORT:-8080}:8080"
    volumes:
      - ./nginx/cratebase.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Cratebase: Host=postgres;Port=5432;Database=cratebase;Username=cratebase;Password=${CRATEBASE_POSTGRES_PASSWORD:?Set CRATEBASE_POSTGRES_PASSWORD}
      DesktopDownloads__MacOsInstallerPath: /var/lib/cratebase/desktop/Cratebase.dmg
      ReleaseCovers__StorageRoot: /var/lib/cratebase/release-covers
    depends_on:
      api-migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - cratebase-service-data:/var/lib/cratebase

  api-migrations:
    build:
      context: ..
      dockerfile: Dockerfile
      target: migrations
    environment:
      CRATEBASE_DESIGN_TIME_CONNECTION_STRING: Host=postgres;Port=5432;Database=cratebase;Username=cratebase;Password=${CRATEBASE_POSTGRES_PASSWORD:?Set CRATEBASE_POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: ../../cratebase-web
      dockerfile: Dockerfile

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cratebase
      POSTGRES_USER: cratebase
      POSTGRES_PASSWORD: ${CRATEBASE_POSTGRES_PASSWORD:?Set CRATEBASE_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cratebase -d cratebase"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - cratebase-postgres-data:/var/lib/postgresql/data

volumes:
  cratebase-postgres-data:
  cratebase-service-data:
