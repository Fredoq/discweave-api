upstream cratebase_api {
    server api:8080;
}

upstream cratebase_web {
    server web:8080;
}

server {
    listen 8080;
    server_name _;

    client_max_body_size 25m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health {
        proxy_pass http://cratebase_api;
    }

    location = /web-health {
        proxy_pass http://cratebase_web;
    }

    location /api/ {
        proxy_pass http://cratebase_api;
    }

    location / {
        proxy_pass http://cratebase_web;
    }
}
